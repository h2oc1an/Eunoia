name: Eunoia
options:
  bundleIdPrefix: com.eunoia
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    version: 0.15.3
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.5.0"
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: "0.4.0"

targets:
  Eunoia:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "macOS/**"
      - path: Core
      - path: Features
      - path: Shared
      - path: Resources
        excludes:
          - "SampleVideos/**"
          - "Info-macOS.plist"
      - path: Resources/SampleVideos
        type: folder
        buildPhase: resources
      - path: Resources/WhisperModels
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eunoia.h2ocean
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        LIBRARY_SEARCH_PATHS: "$(inherited)"
        OTHER_LDFLAGS: "$(inherited)"
    dependencies:
      - package: SQLite
      - package: WhisperKit
      - package: YouTubeKit

  Eunoia-macOS:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: App
      - path: Core
      - path: Features
      - path: Shared
      - path: Resources
        excludes:
          - "SampleVideos/**"
          - "Info.plist"
      - path: Resources/SampleVideos
        type: folder
        buildPhase: resources
      - path: Resources/WhisperModels
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info-macOS.plist
        PRODUCT_NAME: "Eunoia"
        PRODUCT_BUNDLE_IDENTIFIER: com.eunoia.h2ocean.macOS
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        LIBRARY_SEARCH_PATHS: "$(inherited)"
        OTHER_LDFLAGS: "$(inherited)"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
    dependencies:
      - package: SQLite
      - package: WhisperKit
      - package: YouTubeKit
